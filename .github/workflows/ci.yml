name: Portfolio CI (Quality Check)

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  
jobs:
  build-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Starting CI
        run: echo "Portfolio CI Started.."
      
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high  # if high vulnerabilities, fail

      - name: Run Lint
        run: npm run lint

      
      - name: Build Project
        run: npm run build
      

      - name: Successfully Ending CI
        run: echo "Portfolio CI Successfully Ended.."
      